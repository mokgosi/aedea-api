nelmio_cors:
    defaults:
        allow_credentials: true
        origin_regex: false
        allow_origin: ['http://localhost:5173']
        allow_headers: ['*']
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        expose_headers: ['LINK']
        max_age: 3600

    paths:
        '^/api/':
            allow_origin: ['http://localhost:5173']
            allow_headers: ['*']
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            max_age: 3600


